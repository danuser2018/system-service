version: '3.8'

services:
  system-service:
    build: .
    container_name: system-service
    ports:
      - "8000:8000"
    environment:
      - NOVA_NAME=Nova
      - NOVA_AUTHOR=David
      - NOVA_VERSION=2.0.0
      - NOVA_DESCRIPTION=Asistente personal de voz y automatización
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
